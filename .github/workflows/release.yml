# Автоматическая сборка готового архива Voice2kzz для Windows.
# Запускается при пуше тега v* (публикует Release) или вручную из вкладки Actions.
name: Release Windows build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build whisper.cpp (v1.9.1)
        shell: pwsh
        run: |
          git clone --depth 1 --branch v1.9.1 https://github.com/ggerganov/whisper.cpp
          cmake -S whisper.cpp -B whisper.cpp/build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
          cmake --build whisper.cpp/build --config Release

      # Один exe-файл: все библиотеки .NET упаковываются внутрь Voice2kzz.exe.
      # Важно: движок распознавания копируется в publish/tools ПОСЛЕ публикации,
      # иначе упаковщик затягивает его файлы внутрь exe и папка tools оказывается пустой.
      - name: Publish Voice2kzz (single-file, self-contained win-x64)
        shell: pwsh
        run: |
          dotnet publish windows/src/VoxLocal.App/VoxLocal.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=None -p:DebugSymbols=false -o publish

      - name: Copy whisper binaries into publish/tools
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path publish/tools | Out-Null
          Copy-Item whisper.cpp/build/bin/Release/whisper-cli.exe publish/tools/
          Copy-Item whisper.cpp/build/bin/Release/*.dll publish/tools/

      - name: Add helper scripts (install Ollama, uninstall)
        shell: pwsh
        run: |
          Copy-Item windows/dist/*.cmd publish/
          Copy-Item windows/dist/install-ollama.ps1 publish/tools/
          Remove-Item publish/*.pdb -ErrorAction SilentlyContinue

      - name: Verify package layout
        shell: pwsh
        run: |
          if (!(Test-Path publish/Voice2kzz.exe)) { throw "Voice2kzz.exe missing" }
          if (!(Test-Path publish/tools/whisper-cli.exe)) { throw "tools/whisper-cli.exe missing" }
          if (!(Test-Path publish/tools/install-ollama.ps1)) { throw "tools/install-ollama.ps1 missing" }
          if (!(Test-Path publish/install-ollama.cmd)) { throw "install-ollama.cmd missing" }
          if (!(Test-Path publish/uninstall.cmd)) { throw "uninstall.cmd missing" }
          Get-ChildItem -Recurse publish | Select-Object FullName

      - name: Pack ZIP
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath Voice2kzz-win-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice2kzz-win-x64
          path: Voice2kzz-win-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Voice2kzz-win-x64.zip
          generate_release_notes: true
